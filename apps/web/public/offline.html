<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07070D" />
  <title>Sem conexão — Cérebro Amigo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07070D;
      --surface: #0E0E18;
      --text: #ECEBF5;
      --muted: #9B96B5;
      --primary: #9486C9;
      --line: #20202E;
      --glow: rgba(148, 134, 201, 0.35);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 1.5rem;
      text-align: center;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(148, 134, 201, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(229, 115, 115, 0.06), transparent);
    }
    .card {
      position: relative;
      max-width: 22rem;
      width: 100%;
      padding: 2rem 1.5rem;
      border-radius: 1rem;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: 0 0 40px -12px var(--glow);
    }
    .card::before {
      content: "";
      position: absolute;
      inset-inline: 0;
      top: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(148, 134, 201, 0.5), transparent);
      border-radius: 1rem 1rem 0 0;
    }
    .icon {
      display: grid;
      place-items: center;
      width: 3.5rem;
      height: 3.5rem;
      margin: 0 auto 1rem;
      border-radius: 0.875rem;
      background: rgba(148, 134, 201, 0.15);
      color: var(--primary);
      font-size: 1.5rem;
    }
    h1 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: var(--muted); line-height: 1.55; }
    button {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.7rem 1.25rem;
      background: var(--primary);
      color: var(--bg);
      border: none;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">📶</div>
    <h1>Sem conexão com a internet</h1>
    <p>Verifique sua rede e tente novamente. Páginas já visitadas podem estar disponíveis no cache.</p>
    <button type="button" onclick="location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
